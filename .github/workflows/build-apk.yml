name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: |
          if [ -n "$ANDROID_RELEASE_KEYSTORE" ]; then
            echo "$ANDROID_RELEASE_KEYSTORE" | base64 -d > android/app/release.keystore
            echo "Keystore decoded"
          else
            echo "No keystore provided"
          fi
        env:
          ANDROID_RELEASE_KEYSTORE: ${{ secrets.ANDROID_RELEASE_KEYSTORE }}

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          if [ -f app/release.keystore ]; then
            echo "Building release APK..."
            ./gradlew assembleRelease
            cp app/build/outputs/apk/release/app-release.apk "../长夜故事-v$VERSION.apk"
          else
            echo "Building debug APK..."
            ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk "../长夜故事-v$VERSION.apk"
          fi
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: 长夜故事-v${{ steps.version.outputs.VERSION }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: 长夜故事-v${{ steps.version.outputs.VERSION }}.apk
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
